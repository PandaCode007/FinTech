<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Success</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <script src="js/theme.js" defer></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f9f9f9;
      overflow: hidden;
    }

    .msg {
      position: relative;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      text-align: center;
      width: 90%;
      max-width: 400px;
      z-index: 2;
    }

    .site-heading h1 {
      color: #28a745;
      margin-bottom: 10px;
    }

    .use-code-btn {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s ease, background-color 0.3s ease;
      animation: pulse 1.5s infinite;
    }

    .use-code-btn:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .exit-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      font-weight: bold;
      color: #999;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .exit-btn:hover {
      color: #333;
    }

    .emoji {
      position: fixed;
      pointer-events: none;
      animation: float 1.8s ease-out forwards;
      z-index: 1;
    }

    @keyframes float {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-150px) rotate(720deg) scale(1.5);
      }
    }
  </style>
</head>
<body>
  <div class="msg">
    <div class="exit-btn" onclick="window.location.href='/'">&times;</div>
    <div class="site-heading"><h1>🎉 Payment Successful!</h1></div>
    <p>Your access code will be activated shortly.</p>
    <button class="use-code-btn" onclick="window.open('https://royalcommunitybanks.com/', '_blank')">USE CODE</button>
  </div>

  <script>
    const emojis = ['🎉','✨','💥','🥳','🎊','🔥','🎈','🌟','💫'];

    function confettiBurst(count = 20) {
      for (let i = 0; i < count; i++) {
        const emoji = document.createElement('div');
        emoji.classList.add('emoji');
        emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        emoji.style.left = Math.random() * 100 + 'vw';
        emoji.style.top = Math.random() * 100 + 'vh';
        emoji.style.fontSize = (Math.random() * 20 + 20) + 'px';
        document.body.appendChild(emoji);

        setTimeout(() => {
          emoji.remove();
        }, 1800);
      }
    }

    // Burst once on load
    window.addEventListener('load', () => {
      confettiBurst(60); // Big burst first
      setInterval(() => confettiBurst(15), 1500); // Continuous bursts
    });
  </script>
</body>
</html>
