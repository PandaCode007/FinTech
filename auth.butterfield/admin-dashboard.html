<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link rel="icon" href="images/favicon.png" />
  <style>
    :root{
      --bg:#f4f6f9; --surface:#eef2f7; --card:#ffffff; --text:#0f172a; --muted:#64748b; --border:#d1d5db;
      --table-stripe:#f9fbff; --primary:#007BFF; --primary-contrast:#ffffff;
      --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; --button-text:#ffffff;
      --shadow:0 6px 18px rgba(0,0,0,.08); --shadow-sm:0 2px 8px rgba(0,0,0,.06);
      --badge-bg:#ecf2ff; --badge-text:#1e40af;
    }
    body.dark{
      --bg:#0b1220; --surface:#0d1627; --card:#0f172a; --text:#e5e7eb; --muted:#9aa4b2; --border:#263042;
      --table-stripe:#0c172a; --primary:#1d4ed8; --primary-contrast:#e5efff;
      --shadow:0 10px 24px rgba(0,0,0,.35); --shadow-sm:0 2px 8px rgba(0,0,0,.25);
      --badge-bg:#0f1b3a; --badge-text:#93c5fd;
    }
    body{font-family:'Segoe UI',system-ui,-apple-system,Inter,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);margin:0}
    /* app layout */
    .app{display:none;grid-template-columns:260px 1fr;min-height:100vh;background:var(--surface)}
    .sidebar{background:var(--card);border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;box-shadow:var(--shadow-sm)}
    .brand{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;background:linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.02));border:1px solid var(--border);margin-bottom:16px}
    .brand img{width:28px;height:28px}
    .brand .title{font-weight:800;letter-spacing:.2px}
    .nav{display:grid;gap:6px;margin-top:10px}
    .nav a{text-decoration:none;color:var(--text);padding:10px 12px;border-radius:10px;display:flex;align-items:center;gap:10px;border:1px solid transparent;justify-content:center}
    .nav a:hover{background:rgba(0,0,0,.04);border-color:var(--border)}
    body.dark .nav a:hover{background:rgba(255,255,255,.06)}
    .nav a.active{background:var(--primary);color:var(--primary-contrast);border-color:var(--primary)}
    .main{display:grid;grid-template-rows:auto 1fr;min-width:0}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm)}
    .top-actions{display:flex;align-items:center;gap:10px}
    .theme-toggle,.menu-toggle{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-weight:600}
    .content{padding:20px;max-width:1200px;width:100%;margin:0 auto}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-bottom:20px}

    /* login */
    .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;padding:24px}
    .login-screen input{padding:12px;font-size:16px;width:260px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);outline:none;text-align:center}
    .login-screen button{padding:10px 20px;font-weight:700;background:var(--primary);color:var(--primary-contrast);border:none;border-radius:8px;cursor:pointer;margin-top:6px}
    .error{color:var(--danger);font-weight:700;margin-top:5px}

    /* buttons */
    button{padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer}
    #addUserBtn{background:var(--success);color:var(--button-text);border:none}
    .edit-btn{background:var(--warning);color:var(--button-text);border:none}
    .delete-btn{background:var(--danger);color:var(--button-text);border:none}
    .save-btn{background:var(--success);color:var(--button-text);border:none}
    #downloadBtn,#logoutBtn{background:#333;color:#fff;padding:10px 20px;border-radius:8px;border:none}
    body.dark #downloadBtn,body.dark #logoutBtn{background:#222}
    .saveConfigBtn{background:var(--success);color:var(--button-text);margin-top:10px;border:none}

    /* forms */
    .form-group{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;justify-content:center}
    .form-group input,.form-group select{flex:1;min-width:180px;max-width:280px;padding:10px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);outline:none;text-align:center}

    /* table (advanced & centered) */
    .table-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
    .table-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;background:var(--card);border-bottom:1px solid var(--border)}
    .table-toolbar h2{margin:0;width:100%;text-align:center}
    .search{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-left:auto}
    .search input{border:none;outline:none;background:transparent;color:var(--text);min-width:240px;text-align:center}

    .table-scroller{overflow-x:auto}
    table{width:100%;border-collapse:separate;border-spacing:0;min-width:820px}
    thead th{position:sticky;top:0;z-index:2;background:var(--primary);color:var(--primary-contrast);border-bottom:none}
    th,td{padding:12px 14px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
    tbody tr:hover td{background:rgba(0,0,0,.03)}
    body.dark tbody tr:hover td{background:rgba(255,255,255,.05)}
    tbody tr:nth-child(even) td{background:var(--table-stripe)}

    /* inputs INSIDE table cells centered & tidy width */
    td input[type="text"], td select{
      width:100%;
      max-width: 240px;
      margin:0 auto;
      text-align:center;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:8px;
      background:var(--card);
      color:var(--text);
    }

    /* actions cell centered with button group */
    .actions{display:flex;justify-content:center;gap:8px}

    /* code badge preview */
    .code-badge{
      display:inline-flex;align-items:center;justify-content:center;
      padding:4px 10px;border-radius:999px;font-weight:700;font-size:12px;
      background:var(--badge-bg);color:var(--badge-text);border:1px solid var(--border);margin-bottom:6px
    }

    /* pagination centered */
    .pagination{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px;background:var(--card);border-top:1px solid var(--border)}
    .pager-btn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:6px 10px;border-radius:8px;cursor:pointer}
    .pager-btn[disabled]{opacity:.5;cursor:not-allowed}
    .page-num{border:1px solid var(--border);background:transparent;color:var(--text);padding:6px 10px;border-radius:8px;cursor:pointer}
    .page-num.active{background:var(--primary);color:var(--primary-contrast);border-color:var(--primary)}
    .page-ellipsis{padding:0 4px;color:var(--muted)}
    #pageInfo{text-align:center;font-weight:600;color:var(--muted)}

    /* SPA sections */
    .section{display:none}
    .section.active{display:block}

    /* responsive */
    @media (max-width:980px){
      .app{grid-template-columns:1fr}
      .sidebar{position:fixed;inset:0 auto 0 0;width:240px;transform:translateX(-100%);transition:.25s;z-index:100}
      .sidebar.open{transform:translateX(0)}
      .topbar .menu-toggle{display:inline-flex}
      .search{margin:0 auto}
    }
    @media (min-width:981px){.topbar .menu-toggle{display:none}}
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-screen" id="loginScreen">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPass" placeholder="Enter Admin Password" />
    <button onclick="checkPassword()">Enter</button>
    <div class="error" id="loginError"></div>
  </div>

  <!-- APP -->
  <div class="app" id="appLayout">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img src="images/favicon.png" alt="Logo"/>
        <div>
          <div class="title">Admin Center</div>
          <div style="font-size:12px;color:var(--muted);text-align:center">BFA</div>
        </div>
      </div>
      <nav class="nav" id="navMenu">
        <a href="#users"   data-section="users">👥 Users</a>
        <a href="#prices"  data-section="prices">💰 Code Prices</a>
        <a href="#wallets" data-section="wallets">💳 Wallets</a>
      </nav>
    </aside>

    <div class="main">
      <div class="topbar">
        <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">☰ Menu</button>
        <div class="top-actions">
          <button id="downloadBtn">📥 Sync to Server</button>
          <button id="logoutBtn">Logout</button>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙 Dark mode</button>
        </div>
      </div>

      <div class="content">
        <!-- USERS -->
        <section class="card section" id="section-users">
          <div class="table-wrap">
            <div class="table-toolbar">
              <h2>👥 User Accounts</h2>
              <div class="search">
                🔎 <input type="text" id="searchInput" placeholder="Search by ID, name, code type..." />
              </div>
            </div>
            <div class="table-scroller">
              <table>
                <thead>
                <tr>
                  <th style="width:160px">Account ID</th>
                  <th style="width:220px">Name</th>
                  <th style="width:200px">Password</th>
                  <th style="width:200px">Code Type</th>
                  <th style="width:220px">Action</th>
                </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
              </table>
            </div>
            <div class="pagination">
              <button class="pager-btn" id="prevPage">← Prev</button>
              <div id="pageNumbers" class="pager-pages" aria-label="Pagination"></div>
              <button class="pager-btn" id="nextPage">Next →</button>
            </div>
            <div id="pageInfo"></div>
          </div>

          <div class="form-group" style="margin-top:16px">
            <input type="text" id="newAccountId" placeholder="Account ID (10 digits)" maxlength="10" />
            <input type="text" id="newName" placeholder="Full Name" />
            <input type="text" id="newPassword" placeholder="Password" />
            <select id="newCodeType">
              <option value="">-- Select Code Type --</option>
              <option value="COT">COT</option>
              <option value="IMF">IMF</option>
              <option value="TAX">TAX</option>
            </select>
            <button id="addUserBtn">Add User</button>
          </div>
        </section>

        <!-- PRICES -->
        <section class="card section" id="section-prices">
          <h2 style="text-align:center">💰 Code Prices</h2>
          <div class="form-group">
            <input type="number" id="priceCOT" placeholder="COT Price ($)" />
            <input type="number" id="priceIMF" placeholder="IMF Price ($)" />
            <input type="number" id="priceTAX" placeholder="TAX Price ($)" />
          </div>
          <div style="text-align:center">
            <button class="saveConfigBtn" id="savePricesBtn">💾 Save Prices</button>
          </div>
        </section>

        <!-- WALLETS -->
        <section class="card section" id="section-wallets">
          <h2 style="text-align:center">💳 Wallet Addresses</h2>
          <div class="form-group">
            <input type="text" id="walletBTC"  placeholder="BTC Address" />
            <input type="text" id="walletUSDT" placeholder="USDT (ERC20) Address" />
            <input type="text" id="walletUSDC" placeholder="USDC (ERC20) Address" />
          </div>
          <div style="text-align:center">
            <button class="saveConfigBtn" id="saveWalletsBtn">💾 Save Wallets</button>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    /* Theme toggle */
    const themeToggleBtn=document.getElementById('themeToggle');
    (function(){const s=localStorage.getItem('theme');if(s==='dark')document.body.classList.add('dark');if(s==='light')document.body.classList.remove('dark');
      if(!s){const d=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.body.classList.add('dark');}
      updThemeBtn();})();
    function updThemeBtn(){const d=document.body.classList.contains('dark');themeToggleBtn.textContent=d?'☀️ Light mode':'🌙 Dark mode';themeToggleBtn.setAttribute('aria-pressed',String(d))}
    themeToggleBtn.addEventListener('click',()=>{const d=!document.body.classList.contains('dark');document.body.classList.toggle('dark',d);localStorage.setItem('theme',d?'dark':'light');updThemeBtn()});

    /* Sidebar toggle */
    const sidebar=document.getElementById('sidebar');
    document.getElementById('menuToggle').addEventListener('click',()=>sidebar.classList.toggle('open'));

    /* Router */
    const navMenu=document.getElementById('navMenu');
    const sections={users:document.getElementById('section-users'),prices:document.getElementById('section-prices'),wallets:document.getElementById('section-wallets')};
    function setActiveNav(t){navMenu.querySelectorAll('a').forEach(a=>a.classList.toggle('active',a.dataset.section===t))}
    function showSection(t){Object.entries(sections).forEach(([k,el])=>el.classList.toggle('active',k===t));setActiveNav(t)}
    function sectionFromHash(){const h=(location.hash||'#users').replace('#','').toLowerCase();return ['users','prices','wallets'].includes(h)?h:'users'}
    window.addEventListener('hashchange',()=>showSection(sectionFromHash()));

    /* Admin state */
    const ADMIN_PASSWORD="Loskiloose00@@22";
    let accountDatabase=[]; let configData={prices:{},wallets:{}};

    const PAGE_SIZE=10; let currentPage=1; let filteredRows=[];
    const loginScreen=document.getElementById("loginScreen");
    const appLayout=document.getElementById("appLayout");
    const userTableBody=document.getElementById("userTableBody");
    const pageInfo=document.getElementById("pageInfo");
    const pageNumbers=document.getElementById("pageNumbers");
    const prevPageBtn=document.getElementById("prevPage");
    const nextPageBtn=document.getElementById("nextPage");
    const searchInput=document.getElementById("searchInput");

    function checkPassword(){
      const pass=document.getElementById("adminPass").value;
      const err=document.getElementById("loginError");
      if(pass===ADMIN_PASSWORD){
        loginScreen.style.display="none"; appLayout.style.display="grid";
        showSection(sectionFromHash());
        loadDatabase(); loadConfig();
      }else{err.textContent="Incorrect password!"}
    }
    document.getElementById("adminPass").addEventListener("keydown",e=>{if(e.key==="Enter")checkPassword()});

    async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw new Error("GET failed "+u);return await r.json()}
    async function postJSON(u,b){const r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});if(!r.ok)throw new Error("POST failed "+u);return await r.json()}

    async function loadDatabase(){try{accountDatabase=await getJSON("api/get-accounts.php");applyFilterAndRender()}catch{alert("Failed to load users.")}}

    function applyFilterAndRender(){
      const q=(searchInput?.value||"").toLowerCase().trim();
      filteredRows=accountDatabase.filter(u=>{
        const code=(u.codeType||"").toLowerCase();
        return (u.accountId||"").toLowerCase().includes(q)||(u.name||"").toLowerCase().includes(q)||code.includes(q);
      });
      const totalPages=Math.max(1,Math.ceil(filteredRows.length/PAGE_SIZE));
      if(currentPage>totalPages)currentPage=totalPages; if(currentPage<1)currentPage=1;
      renderUsersPage(); renderPagination();
    }

    function codeBadgeLabel(v){return v||'—'}

    function renderUsersPage(){
      userTableBody.innerHTML="";
      const start=(currentPage-1)*PAGE_SIZE;
      const rows=filteredRows.slice(start,start+PAGE_SIZE);
      rows.forEach((user,idx)=>{
        const abs=start+idx;
        const tr=document.createElement("tr");
        tr.innerHTML=`
          <td><input type="text" value="${user.accountId||''}" maxlength="10" disabled/></td>
          <td><input type="text" value="${user.name||''}" disabled/></td>
          <td><input type="text" value="${user.password||''}" disabled/></td>
          <td>
            <div class="code-badge">${codeBadgeLabel(user.codeType)}</div>
            <select disabled>
              <option ${user.codeType==='COT'?'selected':''}>COT</option>
              <option ${user.codeType==='IMF'?'selected':''}>IMF</option>
              <option ${user.codeType==='TAX'?'selected':''}>TAX</option>
            </select>
          </td>
          <td>
            <div class="actions">
              <button class="edit-btn" data-absindex="${abs}">✏️ Edit</button>
              <button class="delete-btn" data-absindex="${abs}">🗑️</button>
            </div>
          </td>`;
        userTableBody.appendChild(tr);
      });

      // actions
      document.querySelectorAll(".delete-btn").forEach(btn=>{
        btn.onclick=()=>{
          const abs=Number(btn.dataset.absindex);
          const user=filteredRows[abs];
          const idx=accountDatabase.findIndex(u=>u.accountId===user.accountId&&u.name===user.name&&u.password===user.password&&u.codeType===user.codeType);
          if(idx>-1)accountDatabase.splice(idx,1);
          saveAccounts(); applyFilterAndRender();
        };
      });
      document.querySelectorAll(".edit-btn").forEach(btn=>{
        btn.onclick=()=>{
          const row=btn.closest("tr");
          const inputs=row.querySelectorAll("input, select");
          const badge=row.querySelector(".code-badge");
          const abs=Number(btn.dataset.absindex);
          const original=filteredRows[abs];

          if(btn.textContent.includes("Edit")){
            inputs.forEach(i=>i.disabled=false);
            btn.textContent="💾 Save"; btn.classList.remove("edit-btn"); btn.classList.add("save-btn");
          }else{
            const updated={
              accountId:inputs[0].value.trim(),
              name:inputs[1].value.trim(),
              password:inputs[2].value.trim(),
              codeType:inputs[3].value
            };
            badge.textContent=codeBadgeLabel(updated.codeType);
            const idx=accountDatabase.findIndex(u=>u.accountId===original.accountId&&u.name===original.name&&u.password===original.password&&u.codeType===original.codeType);
            if(idx>-1)accountDatabase[idx]=updated;
            saveAccounts(); applyFilterAndRender();
          }
        };
      });

      const total=filteredRows.length, end=Math.min(start+PAGE_SIZE,total), startDisp=total?start+1:0;
      pageInfo.textContent=`Showing ${startDisp}–${end} of ${total}`;
    }

    function renderPagination(){
      const totalPages=Math.max(1,Math.ceil(filteredRows.length/PAGE_SIZE));
      prevPageBtn.disabled=currentPage<=1; nextPageBtn.disabled=currentPage>=totalPages;
      pageNumbers.innerHTML="";
      const windowSize=7; let start=Math.max(1,currentPage-Math.floor(windowSize/2)); let end=start+windowSize-1;
      if(end>totalPages){end=totalPages; start=Math.max(1,end-windowSize+1)}
      if(start>1){addPageBtn(1); if(start>2)addEllipsis()}
      for(let p=start;p<=end;p++) addPageBtn(p,p===currentPage);
      if(end<totalPages){ if(end<totalPages-1)addEllipsis(); addPageBtn(totalPages) }

      function addPageBtn(page,active=false){
        const b=document.createElement('button');
        b.className='page-num'+(active?' active':'');
        b.textContent=page;
        b.onclick=()=>{currentPage=page; renderUsersPage(); renderPagination()};
        pageNumbers.appendChild(b);
      }
      function addEllipsis(){const s=document.createElement('span');s.className='page-ellipsis';s.textContent='…';pageNumbers.appendChild(s)}
    }

    prevPageBtn.addEventListener('click',()=>{if(currentPage>1){currentPage--;renderUsersPage();renderPagination()}});
    nextPageBtn.addEventListener('click',()=>{const totalPages=Math.max(1,Math.ceil(filteredRows.length/PAGE_SIZE));if(currentPage<totalPages){currentPage++;renderUsersPage();renderPagination()}})
    searchInput.addEventListener('input',()=>{currentPage=1;applyFilterAndRender()});

    document.getElementById("addUserBtn").onclick=()=>{
      const id=document.getElementById("newAccountId").value.trim();
      const name=document.getElementById("newName").value.trim();
      const password=document.getElementById("newPassword").value.trim();
      const codeType=document.getElementById("newCodeType").value;

      if(!/^\d{10}$/.test(id)) return alert("Account ID must be 10 digits.");
      if(!name||!password||!codeType) return alert("Please fill in all fields.");
      if(accountDatabase.some(u=>u.accountId===id)) return alert("Account already exists.");

      accountDatabase.push({accountId:id,name,password,codeType});
      saveAccounts();
      document.getElementById("newAccountId").value="";
      document.getElementById("newName").value="";
      document.getElementById("newPassword").value="";
      document.getElementById("newCodeType").value="";

      applyFilterAndRender();
      const totalPages=Math.ceil(filteredRows.length/PAGE_SIZE);
      currentPage=totalPages; renderUsersPage(); renderPagination();
    };

    async function saveAccounts(){try{const d=await postJSON("api/save-accounts.php",accountDatabase);alert(d.message||"Accounts saved successfully.")}catch{alert("Failed to save accounts.")}}

    /* config */
    async function loadConfig(){
      try{
        configData=await getJSON("api/get-config.php");

        if(configData.prices){
          document.getElementById("priceCOT").value=configData.prices.COT??"";
          document.getElementById("priceIMF").value=configData.prices.IMF??"";
          document.getElementById("priceTAX").value=configData.prices.TAX??"";
        }
        if(configData.wallets){
          document.getElementById("walletBTC").value=configData.wallets.BTC??"";
          document.getElementById("walletUSDT").value=configData.wallets.USDT??"";
          document.getElementById("walletUSDC").value=configData.wallets.USDC??"";
        }
      }catch{alert("Failed to load configuration.")}
    }
    document.getElementById("savePricesBtn").onclick=async()=>{
      configData.prices={
        COT:parseFloat(document.getElementById("priceCOT").value)||0,
        IMF:parseFloat(document.getElementById("priceIMF").value)||0,
        TAX:parseFloat(document.getElementById("priceTAX").value)||0
      }; saveConfig();
    };
    document.getElementById("saveWalletsBtn").onclick=async()=>{
      configData.wallets={
        BTC:document.getElementById("walletBTC").value.trim(),
        USDT:document.getElementById("walletUSDT").value.trim(),
        USDC:document.getElementById("walletUSDC").value.trim()
      }; saveConfig();
    };
    async function saveConfig(){try{const d=await postJSON("api/save-config.php",configData);alert(d.message||"Configuration saved successfully.")}catch{alert("Failed to save configuration.")}}


    /* logout */
    document.getElementById("logoutBtn").onclick=()=>{document.getElementById("appLayout").style.display="none";document.getElementById("loginScreen").style.display="flex";document.getElementById("adminPass").value="";document.getElementById("loginError").textContent="";location.hash="#users"};

    /* expose login for button */
    window.checkPassword=checkPassword;
  </script>
</body>
</html>
