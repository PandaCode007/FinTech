<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Processing</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <script src="js/theme.js" defer></script>
  <script src="js/verifyTx.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f3f9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    .box {
      max-width: 600px;
      width: 90%;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
      margin: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    select, .wallet button, #paidBtn, #txHashInput {
      width: auto;
      padding: 8px 15px;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      display: inline-block;
    }

    .wallet {
      margin-top: 20px;
      text-align: center;
      background: #fefefe;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      display: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .wallet:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .wallet label {
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .wallet code {
      font-family: monospace;
      word-break: break-word;
      display: block;
      margin: 5px 0;
    }

    .wallet img {
      width: 22px;
      height: 22px;
    }

    .wallet .barcode {
      width: 150px;
      height: 150px;
      margin-top: 10px;
      transition: transform 0.3s ease;
    }

    .wallet:hover .barcode {
      transform: scale(1.05);
    }

    .wallet button {
      margin-top: 10px;
      transition: all 0.3s ease;
      background-color: #28a745;
      color: white;
      border: none;
    }

    .wallet button:hover {
      box-shadow: 0 0 10px #28a745b3;
      background-color: #218838;
    }

    #paidBtn {
      background-color: #28a745;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .fade-in {
      display: block !important;
      opacity: 1 !important;
    }

    .fade-out {
      opacity: 0 !important;
      transition: opacity 0.5s ease-in-out;
    }

    #spinner {
      display: none;
      margin-top: 20px;
    }

    #statusMsg {
      margin-top: 15px;
      font-size: 16px;
      color: #333;
    }

    #timer {
      font-size: 18px;
      color: #dc3545;
      margin-top: 20px;
      font-weight: bold;
    }

    #txHashInput {
      display: none;
    }

    #continueBtn {
      display: none;
      background-color: #007bff;
      color: white;
      font-weight: bold;
      margin-top: 20px;
    }

    .error {
      color: red;
      font-weight: bold;
    }

    .copy-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.85);
      color: white;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      z-index: 9999;
    }

    select {
      background-image: url('images/arrow-down.png');
      background-position: right 10px center;
      background-repeat: no-repeat;
      background-size: 20px;
      width: 70%;
      margin: 0 auto;
    }

    option {
      padding-left: 20px;
      background-size: 18px 18px;
      background-repeat: no-repeat;
      background-position: left center;
    }

    option[value="Visa"] {
      background-image: url('images/visa.png');
    }

    option[value="Zelle"] {
      background-image: url('images/zelle.png');
    }

    option[value="ApplePay"] {
      background-image: url('images/apple.png');
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
      text-align: center;
      width: 80%;
      max-width: 400px;
    }

    .popup input {
      margin-top: 15px;
      width: 80%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .popup button {
      margin-top: 20px;
      padding: 12px;
      background-color: #28a745;
      color: white;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      border-radius: 8px;
      border: none;
    }

    .popup button:disabled {
      background-color: #aaa;
    }

    .popup button.active {
      background-color: #28a745;
    }

    .popup .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      color: #aaa;
      cursor: pointer;
    }

    .popup .close-btn:hover {
      color: red;
    }

    .payment-not-available {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      animation: fadeIn 1s ease-in-out;
    }

    .payment-not-available .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
      color: #aaa;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="site-heading">
      <h2>💸 Complete Your Payment</h2>
    </div>
    <p>Select a method, send the payment, then click "I've Paid" and enter your transaction hash.</p>

    <select id="paymentMethod">
      <option value="">-- Select Payment Method --</option>
      <option value="BTC">Bitcoin (BTC)</option>
      <option value="USDT">USDT (ERC20)</option>
      <option value="USDC">USDC (ERC20)</option>
      <option value="Visa">Visa</option>
      <option value="Zelle">Zelle</option>
      <option value="ApplePay">Apple Pay</option>
    </select>

    <!-- BTC Wallet -->
    <div class="wallet" id="btcWallet">
      <label><img src="images/btc.png" alt="BTC"> BTC:</label>
      <code id="btcAddr">Loading...</code>
      <img id="btcQR" src="" alt="BTC Barcode" class="barcode" />
      <br />
      <button onclick="copyToClipboard('btcAddr')">Copy BTC</button>
    </div>

    <!-- USDT Wallet -->
    <div class="wallet" id="usdtWallet">
      <label><img src="images/usdt.png" alt="USDT"> USDT (ERC20):</label>
      <code id="usdtAddr">Loading...</code>
      <img id="usdtQR" src="" alt="USDT Barcode" class="barcode" />
      <br />
      <button onclick="copyToClipboard('usdtAddr')">Copy USDT</button>
    </div>

    <!-- USDC Wallet -->
    <div class="wallet" id="usdcWallet">
      <label><img src="images/usdc.png" alt="USDC"> USDC (ERC20):</label>
      <code id="usdcAddr">Loading...</code>
      <img id="usdcQR" src="" alt="USDC Barcode" class="barcode" />
      <br />
      <button onclick="copyToClipboard('usdtAddr')">Copy USDC</button>
    </div>

    <input type="text" id="txHashInput" placeholder="Enter Transaction Hash ID" />
    <div id="timer">⏳ Time left: 10:00</div>
    <button id="paidBtn">✅ I've Paid</button>
    <button id="continueBtn" onclick="redirectToSuccess()">Continue</button>

    <div id="spinner">⏳ Verifying transaction hash on blockchain...</div>
    <div id="statusMsg"></div>
    <div id="errorCount" class="error"></div>

    <div class="popup" id="hashPopup">
      <span class="close-btn" onclick="closeHashPopup()">❌</span>
      <h3>Enter Transaction Hash</h3>
      <input type="text" id="hashInput" placeholder="Enter Transaction Hash ID" />
      <button id="confirmBtn" onclick="confirmHash()" disabled>Confirm Payment</button>
    </div>

    <div id="copyPopup" class="copy-popup">Address Copied to Clipboard!</div>
    <audio id="copySound" src="https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3" preload="auto"></audio>
  </div>

  <script>
    // ===== Dynamic Config Loader (wallets from admin) =====
    let CONFIG = null;
    async function loadConfig(){
      if (CONFIG) return CONFIG;
      try {
        const res = await fetch('api/get-config.php', { cache: 'no-store' });
        CONFIG = await res.json();
        return CONFIG;
      } catch (e) {
        console.error('Failed to load config', e);
        return null;
      }
    }

    function qrUrl(data) {
      return 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(data || '');
    }

    async function populateWallets(){
      const cfg = await loadConfig();
      if (!cfg || !cfg.wallets) return;

      const w = cfg.wallets;

      // BTC
      if (document.getElementById('btcAddr')) {
        const val = w.BTC || '';
        document.getElementById('btcAddr').textContent = val || 'Not configured';
        document.getElementById('btcQR').src = qrUrl(val);
      }

      // USDT (ERC20)
      if (document.getElementById('usdtAddr')) {
        const val = w.USDT || '';
        document.getElementById('usdtAddr').textContent = val || 'Not configured';
        document.getElementById('usdtQR').src = qrUrl(val);
      }

      // USDC (ERC20)
      if (document.getElementById('usdcAddr')) {
        const val = w.USDC || '';
        document.getElementById('usdcAddr').textContent = val || 'Not configured';
        document.getElementById('usdcQR').src = qrUrl(val);
      }
    }

    // ===== Existing UI/Behavior =====
    const hashInputField = document.getElementById('hashInput');
    const confirmBtn = document.getElementById('confirmBtn');
    const paidBtn = document.getElementById('paidBtn');

    hashInputField.addEventListener('input', () => {
      if (hashInputField.value.trim().length >= 64) {
        confirmBtn.disabled = false;
        confirmBtn.classList.add('active');
      } else {
        confirmBtn.disabled = true;
        confirmBtn.classList.remove('active');
      }
    });

    function copyToClipboard(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const popup = document.getElementById('copyPopup');
        const sound = document.getElementById('copySound');
        if (sound) sound.play();
        popup.style.display = 'block';
        popup.style.opacity = 1;
        setTimeout(() => {
          popup.style.opacity = 0;
          setTimeout(() => popup.style.display = 'none', 500);
        }, 2000);
      });
    }

    function closeHashPopup() {
      document.getElementById('hashPopup').style.display = 'none';
      paidBtn.style.display = 'block';
    }

    let countdownStart = localStorage.getItem('countdownStart');
    const timerElement = document.getElementById("timer");

    if (!countdownStart) {
      countdownStart = Date.now();
      localStorage.setItem('countdownStart', countdownStart);
    }

    function getRemainingTime() {
      const totalDuration = 10 * 60 * 1000;
      const now = Date.now();
      const remaining = totalDuration - (now - parseInt(countdownStart));
      return remaining > 0 ? remaining : 0;
    }

    function updateCountdown() {
      const remaining = getRemainingTime();
      if (remaining <= 0) {
        clearInterval(countdownInterval);
        localStorage.removeItem('countdownStart');
        alert("Payment time expired. Redirecting...");
        window.location.href = "failed.html";
        return;
      }

      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      timerElement.textContent = `⏳ Time left: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    const countdownInterval = setInterval(updateCountdown, 1000);
    updateCountdown();

    paidBtn.addEventListener('click', () => {
      const method = document.getElementById('paymentMethod').value;
      if (!method) return alert("Please select a payment method.");
      document.getElementById('hashPopup').style.display = 'block';
      paidBtn.style.display = 'none';
    });

    function redirectToSuccess() {
      window.location.href = "success.html";
    }

    document.getElementById('paymentMethod').addEventListener('change', (event) => {
      const selected = event.target.value;
      document.getElementById('btcWallet').style.display = 'none';
      document.getElementById('usdtWallet').style.display = 'none';
      document.getElementById('usdcWallet').style.display = 'none';

      if (selected === 'BTC') {
        document.getElementById('btcWallet').style.display = 'block';
      } else if (selected === 'USDT') {
        document.getElementById('usdtWallet').style.display = 'block';
      } else if (selected === 'USDC') {
        document.getElementById('usdcWallet').style.display = 'block';
      }

      if (['BTC', 'USDT', 'USDC'].includes(selected)) {
        paidBtn.classList.remove('fade-out');
        paidBtn.classList.add('fade-in');
      } else {
        paidBtn.classList.remove('fade-in');
        paidBtn.classList.add('fade-out');
        setTimeout(() => {
          paidBtn.style.display = 'none';
        }, 500);
      }
    });

    // Boot: load wallets from admin config
    document.addEventListener('DOMContentLoaded', populateWallets);
  </script>
</body>
</html>
