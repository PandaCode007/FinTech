<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get New Code</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <script src="js/theme.js" defer></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .code-box {
      background: white;
      max-width: 450px;
      width: 90%;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    select, input, button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    #accessBtn {
      background: gray;
      color: white;
      font-weight: bold;
      cursor: not-allowed;
      transition: background 0.3s ease;
    }
    #accessBtn.active {
      background-color: #28a745;
      cursor: pointer;
    }
    .price-display {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="code-box">
    <div class="site-heading"><h2>🧾 Get New Code</h2></div>
    <form id="codeForm">
      <select id="codeType" required>
        <option value="">-- Select Code Type --</option>
        <option value="IMF">IMF Code</option>
      </select>
      <input type="text" id="accountId" placeholder="Account ID" readonly />
      <p class="price-display" id="priceDisplay"></p>
      <button type="button" id="accessBtn" disabled>Access Code Now</button>
    </form>
  </div>

  <script>
    // Elements
    const accountIdInput = document.getElementById('accountId');
    const codeType = document.getElementById('codeType');
    const priceDisplay = document.getElementById('priceDisplay');
    const accessBtn = document.getElementById('accessBtn');

    // Autofill Account ID
    const storedId = localStorage.getItem("accountId");
    if (storedId) accountIdInput.value = storedId;

    // Config cache + loader
    let CONFIG = null;
    async function loadConfig(){
      if (CONFIG) return CONFIG;
      try {
        const res = await fetch('api/get-config.php');
        CONFIG = await res.json();
        return CONFIG;
      } catch (e){
        console.error('Failed to load config', e);
        return null;
      }
    }

    // On code type change -> show dynamic price
    codeType.addEventListener('change', async () => {
      const cfg = await loadConfig();
      const selected = codeType.value;
      if (!cfg || !selected) {
        priceDisplay.textContent = '';
        accessBtn.classList.remove('active');
        accessBtn.disabled = true;
        return;
      }
      const price = (cfg.prices || {})[selected];
      if (price !== undefined) {
        priceDisplay.textContent = `${selected} Code Price: $${Number(price).toLocaleString()}`;
        accessBtn.classList.add('active');
        accessBtn.disabled = false;
      } else {
        priceDisplay.textContent = '';
        accessBtn.classList.remove('active');
        accessBtn.disabled = true;
      }
    });

    // Continue to payment
    accessBtn.addEventListener('click', () => {
      localStorage.setItem("selectedCodeType", codeType.value);
      window.location.href = "payment-process.html";
    });
  </script>
</body>
</html>
